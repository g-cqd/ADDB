# The COMMON legs (lint/gate + build & test on macOS + Linux, debug/release, coverage) route through
# the shared reusable workflow. The package-UNIQUE jobs fan out alongside it: the sqlite-backed Linux
# differential lane (x64 + arm64), the cross-platform compile matrix, the ASan/TSan passes (main +
# PR-curated), the ADSQL-vs-SQLite benchmark, and the DocC build+deploy / PR link check.
#
# HUMAN REVIEW (see report): ADDB's tests link `CSQLite` (libsqlite3) and the cross-process tests
# need the built `adsql` CLI path on Linux. The reusable workflow's Linux leg runs plain
# `swift build`/`swift test` with NO `apt-get install libsqlite3-dev` and no `ADSQL_CLI_PATH`, so it
# will fail on Linux once `AD_SWIFT_SIBLINGS_PUBLISHED` flips true (it is skipped until then). The
# correct Linux verification is the package-unique `linux` job below, which installs sqlite and passes
# the CLI path. Consider adding a system-deps input to the reusable workflow, or treat the reusable
# Linux leg as macOS-parity only. (macOS ships libsqlite3, so the reusable macOS leg is fine.)
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", "CONTRIBUTING.md", "ROADMAP.md", ".gitignore", ".githooks/**"]
  pull_request:
    paths-ignore: ["README.md", "CONTRIBUTING.md", "ROADMAP.md", ".gitignore", ".githooks/**"]
  # On-demand trigger for the slow sanitizer passes (and a full platform/docs run when wanted).
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on branches/PRs; never cancel an in-progress run on main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    # Full-adopt of the reusable workflow for the COMMON gate + build/test (macOS + Linux, debug +
    # release; coverage on the debug macOS leg). ADDB depends on the first-party siblings ADSQL,
    # ADFoundation, ADJSON and ADConcurrency (resolved from branch: main — Package.swift lines 36–39,
    # in the always-on dependency array), so the resolution-dependent jobs stay gated on
    # AD_SWIFT_SIBLINGS_PUBLISHED; the file-based gates (format/metrics/drift + the internal-tag check
    # that the bespoke STRICT_TAGS step did) always run. Sanitizers/docs are NOT enabled here: the
    # `sanitizers`/`pr-thread-sanitizer` jobs below use main-vs-PR gating with combined per-pass flags,
    # and the DocC legs below add a Pages DEPLOY and a PR-only link check — none covered by the reusable.
    uses: g-cqd/ADBuildTools/.github/workflows/swift-quality.yml@v1
    with:
      dev-env-var: ADDB_DEV
      requires-published-siblings: true

  # Linux build + test lane (RFC 0010 F0 — the #1 apple-docs adoption gate). ADSQL was Darwin-only;
  # this lane is the actual Linux verification (the port is developed on macOS, which cannot build for
  # Linux locally). `swift build` + the full `swift test` differential suite PASS on x64 + arm64 — the
  # Glibc forks (clonefile->copy snapshot, fdatasync/fsync barriers, posix_fallocate, the cross-process
  # reader table, XSI strerror_r) are validated at runtime, so F0 is functionally done. This is the
  # package-unique Linux lane the reusable's plain Linux leg can't be (it installs libsqlite3-dev and
  # passes the CLI path, and runs the arm64 runner too).
  #
  # STILL ADVISORY (`continue-on-error: true`) for one reason historically: the lane tracked the MOVING
  # `nightly-6.4-jammy` tag, so a required gate would let an unrelated bad nightly redden main. Now that
  # the image is pinned to a DATED nightly (#14), the remaining blocker is a stable >= 6.4 release that
  # parses the 6.4 manifest; drop `continue-on-error` to make Linux a required gate once that ships.
  #
  # Toolchain: the manifest is `swift-tools-version: 6.4` with `.strictMemorySafety()` (SE-0458) plus
  # the experimental `Lifetimes` feature (SE-0446/0456), so the Linux toolchain must be recent enough to
  # parse and honor them. Released `swift:6.0`/`6.1` images predate the manifest and can't parse it; the
  # dated nightly tracks a development toolchain that ships these features.
  linux:
    name: Build & test (Linux, ${{ matrix.arch }})
    needs: quality
    continue-on-error: true
    runs-on: ${{ matrix.runner }}
    # Dated nightly pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v6
      - name: Show toolchain
        run: swift --version
      # CSQLite (a system-library target) links libsqlite3; its dev headers back the SQLite-file
      # importer, the benchmark harness, and the differential tests. The engine (ADDBCore) does
      # not link sqlite3, but `swift build` resolves the whole graph.
      - name: Install libsqlite3-dev
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-linux-${{ matrix.arch }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Tests/**', 'Plugins/**') }}
          restore-keys: |
            spm-linux-${{ matrix.arch }}-${{ hashFiles('Package.swift') }}-
            spm-linux-${{ matrix.arch }}-
      - name: Build
        run: swift build
      - name: Test (SQLite-differential suite)
        # The cross-process tests spawn the built `adsql` CLI; on Linux there is no
        # `.xctest` bundle to locate it next to, so pass its exact path explicitly.
        run: ADSQL_CLI_PATH="$(swift build --show-bin-path)/adsql" swift test

  platforms:
    name: Build (${{ matrix.platform }})
    needs: quality
    # Cross-platform compile is broad but costly: run it on main / on demand, not on every PR
    # (the macOS leg in the reusable `quality` job already covers compilation for PRs).
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS, visionOS]
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM + DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .derivedData
          key: spm-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-${{ matrix.platform }}-
      - name: Build for ${{ matrix.platform }}
        run: >-
          xcodebuild build
          -scheme ADSQL
          -destination "generic/platform=${{ matrix.platform }}"
          -derivedDataPath .derivedData
          -skipMacroValidation
          -skipPackagePluginValidation

  sanitizers:
    name: Sanitize (${{ matrix.name }})
    needs: quality
    # Sanitizers are slow (TSan ~5-15x, ASan ~2x) and rebuild the whole graph under instrumentation,
    # so run them on main / on demand — never on every PR. The differential + property suites double
    # as the stress input that trips data races (TSan) in the single-writer / wait-free-reader and
    # group-commit layers, and OOB / use-after-free (ASan) in the mmap'd page views and record
    # codecs. These find what `-enable-actor-data-race-checks` (actor-isolation only) cannot. TSan
    # and ASan are mutually exclusive, hence two passes. Package-unique (not the reusable's sanitizer
    # leg): main/dispatch-gated, and each pass combines its own flags.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: thread, flags: "--sanitize=thread" }
          - { name: address, flags: "--sanitize=address --sanitize=undefined" }
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Show toolchain
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-san-${{ matrix.name }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Tests/**', 'Plugins/**') }}
          restore-keys: |
            spm-${{ runner.os }}-san-${{ matrix.name }}-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-san-${{ matrix.name }}-
      - name: Test under ${{ matrix.name }} sanitizer
        run: swift test ${{ matrix.flags }}

  benchmarks:
    name: Benchmark (macOS, release)
    needs: quality
    # Benchmarks rebuild the graph in release and are noisy on shared runners, so run them on
    # main / on demand — never on every PR (same gating as the platforms/sanitizers jobs). The
    # run publishes its numbers to the run's job summary for at-a-glance tracking; it is not a
    # regression gate (hosted-runner variance would make a hard threshold flaky).
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Show toolchain
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-bench-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-bench-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-bench-
      - name: Build benchmarks (release)
        run: swift build -c release --target ADSQLBench
      - name: Run benchmarks (ADSQL vs SQLite)
        run: |
          set -o pipefail
          swift run -c release ADSQLBench | tee bench-output.txt
      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## ADSQL benchmarks"
            echo ""
            echo "Release build · runner \`${{ runner.os }}\` · commit \`${GITHUB_SHA:0:7}\`"
            echo ""
            echo '```text'
            cat bench-output.txt 2>/dev/null || echo "(no benchmark output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Build & deploy docs (Pages)
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Serialize Pages deploys without cancelling an in-flight publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    env:
      ADDB_DEV: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-docs-
      - name: Build DocC site (static hosting)
        # One combined archive over the engine, the SQL layer, and the opt-in
        # supersets (each is its own product/catalog after the module split).
        run: |
          swift package --allow-writing-to-directory "$PWD/_site" \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target ADDBCore --target ADSQL \
            --target ADSQLFullTextSearch --target ADSQLJSON \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path ADSQL \
            --output-path "$PWD/_site"
      - name: Add root redirect to the documentation landing page
        run: |
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=documentation/adsql/">
          <link rel="canonical" href="documentation/adsql/">
          <title>ADSQL</title>
          <a href="documentation/adsql/">ADSQL documentation</a>
          HTML
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  docs-build:
    name: Build docs (PR check)
    needs: quality
    # Build the DocC site (no deploy) on PRs to catch broken symbol links / missing
    # docs before they reach main; the build+deploy job runs from `docs` on main.
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    env:
      ADDB_DEV: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-docs-
      - name: Build DocC (no deploy)
        # Build every product catalog so a broken cross-module link in any of them
        # fails the PR check, not just ADSQL's.
        run: |
          swift package --allow-writing-to-directory "$PWD/_docs-check" \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target ADDBCore --target ADSQL \
            --target ADSQLFullTextSearch --target ADSQLJSON \
            --disable-indexing --output-path "$PWD/_docs-check"
